# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# you can choose themes from $HOME/.config/kitty/kitty-themes/
include ./kitty-themes/mocha.conf

font_family FantasqueSansM Nerd Font Mono Bold
font_size 11.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.9
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4

selection_foreground none
selection_background none

foreground #dddddd
background #000000
cursor #dddddd


# Move between splits with Alt keys
map alt+left  neighboring_window left
map alt+right neighboring_window right
map alt+up    neighboring_window up
map alt+down  neighboring_window down

map alt+h  neighboring_window left
map alt+l neighboring_window right
map alt+k    neighboring_window up
map alt+j  neighboring_window down

tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Create new tabs and windows in current directory
map kitty_mod+t new_tab_with_cwd
map kitty_mod+n new_window_with_cwd

# configure tap
map ctrl+shift+f1 set_tab_title 󰇥
map ctrl+shift+f2 set_tab_title 
map ctrl+shift+f3 set_tab_title 
map ctrl+shift+f3 set_tab_title 󱘯
map ctrl+shift+f4 set_tab_title 
map ctrl+shift+f5 set_tab_title 
map ctrl+shift+f6 set_tab_title 
map ctrl+shift+f9 set_tab_title
