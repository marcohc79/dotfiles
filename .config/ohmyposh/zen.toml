"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
version = 4

[[blocks]]
alignment = "left"
type = "prompt"

[[blocks.segments]]
background = "#29315A"
foreground = "#3EC669"
leading_diamond = ""
style = "diamond"
template = " {{ .Path }}"
trailing_diamond = ""
type = "path"

[blocks.segments.options]
style = "mixed"

[[blocks.segments]]
background = "#29315A"
foreground = "#43CCEA"
foreground_templates = [
  "{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}",
  "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}",
  "{{ if gt .Ahead 0 }}#B388FF{{ end }}",
  "{{ if gt .Behind 0 }}#B388FF{{ end }}",
]
leading_diamond = " "
style = "diamond"
template = " {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} "
trailing_diamond = ""
type = "git"

[blocks.segments.options]
branch_template = "{{ trunc 25 .Branch }}"
fetch_status = true
fetch_upstream_icon = true

[[blocks.segments]]
foreground = "#C94A16"
style = "plain"
template = "x "
type = "status"

[[blocks]]
alignment = "right"
type = "prompt"

[[blocks.segments]]
type = "node"
style = "plain"
foreground = "#88e570"
template = "{{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }} {{ .Full }}"

[blocks.segments.options]
display_mode = "files"
fetch_package_manager = true
fetch_version = true
bun_icon = "<#e5dbcc> bun</>"
npm_icon = "<#e5272d> npm</> "
pnpm_icon = "<#e5a100> pnpm</> "
yarn_icon = "<#37aee5> yarn</> "

[[blocks.segments]]
foreground = "#4063D8"
style = "plain"
template = " {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}"
type = "crystal"

[blocks.segments.options]
display_mode = "files"
fetch_version = true

[[blocks.segments]]
foreground = "#DE3F24"
style = "plain"
template = " {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}"
type = "ruby"

[blocks.segments.options]
display_mode = "files"
fetch_version = true

[[blocks.segments]]
foreground = "#FED142"
style = "plain"
template = " {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}"
type = "python"

[blocks.segments.options]
display_mode = "context"
fetch_virtual_env = false

[[blocks]]
alignment = "left"
newline = true
type = "prompt"

[[blocks.segments]]
foreground = "#63F08C"
style = "plain"
template = "➜ "
type = "text"
